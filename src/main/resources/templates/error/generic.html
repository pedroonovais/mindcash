<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/public-layout :: publicPage('Erro — MindCash', ~{::.page-content})}"
      lang="pt-br">
<head>
    <title>Erro — MindCash</title>
</head>
<body>
<div class="page-content min-h-screen flex items-center justify-center p-4 bg-background-light dark:bg-background-dark">
    <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
        <h1 class="text-xl font-semibold text-slate-900 dark:text-white mb-2">Algo deu errado</h1>
        <p class="text-slate-600 dark:text-slate-400 text-sm mb-6" th:text="${errorMessage} ?: 'Ocorreu um erro inesperado. Tente novamente.'"></p>
        <a th:href="@{/app/dashboard}" class="inline-block bg-accent-emerald hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
            Voltar ao Dashboard
        </a>
    </div>
</div>
</body>
</html>
