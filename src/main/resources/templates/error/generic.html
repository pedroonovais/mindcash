<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Erro — MindCash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-neutral-200 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
    <h1 class="text-xl font-semibold text-neutral-900 mb-2">Algo deu errado</h1>
    <p class="text-neutral-700 text-sm mb-6" th:text="${errorMessage} ?: 'Ocorreu um erro inesperado. Tente novamente.'"></p>
    <a th:href="@{/app/dashboard}" class="inline-block bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90">
        Voltar ao Dashboard
    </a>
</div>
</body>
</html>
