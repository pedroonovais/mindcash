<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — MindCash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1A237E', 600: '#084ED6' },
                        secondary: '#00B88A',
                        accent: '#FFB020',
                        danger: '#E02424',
                        neutral: { 200: '#E6EEF8', 700: '#334155', 900: '#0F1724' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary via-primary-600 to-primary flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <a th:href="@{/}" class="text-2xl font-bold text-white tracking-tight">MindCash</a>
        <p class="text-white/60 mt-1 text-sm">Acesse sua conta</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-xl font-semibold text-neutral-900 mb-6">Login</h2>

        <div th:if="${param.error}" class="mb-4 bg-red-50 border border-red-200 text-danger px-4 py-3 rounded-lg text-sm">
            E-mail ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="mb-4 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg text-sm">
            Logout realizado com sucesso.
        </div>
        <div th:if="${success}" class="mb-4 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg text-sm">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-neutral-700 mb-1.5">E-mail</label>
                <input type="email" id="username" name="username" required autocomplete="email"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent transition"/>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-neutral-700 mb-1.5">Senha</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent transition"/>
            </div>
            <button type="submit"
                    class="w-full bg-primary hover:bg-primary-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                Entrar
            </button>
        </form>

        <p class="text-center text-sm text-neutral-700 mt-6">
            Não tem conta?
            <a th:href="@{/auth/register}" class="text-primary-600 font-medium hover:underline">Criar conta</a>
        </p>
    </div>
</div>

</body>
</html>
