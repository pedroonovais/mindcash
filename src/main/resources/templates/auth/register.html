<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/public-layout :: publicPage('Criar Conta — MindCash', ~{::.page-content})}"
      lang="pt-br">
<head>
    <title>Criar Conta — MindCash</title>
</head>
<body>
<div class="page-content min-h-screen flex items-center justify-center p-4 bg-background-light dark:bg-background-dark">
    <div class="fixed top-4 right-4 z-50" th:insert="~{fragments/theme-toggle :: themeToggleButton}"></div>
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a th:href="@{/}" class="flex items-center justify-center">
                <img th:src="@{/img/logo.png}" alt="MindCash" class="h-12 w-auto object-contain hidden dark:block"/>
                <img th:src="@{/img/logo_dark_letter.png}" alt="MindCash" class="h-12 w-auto object-contain dark:hidden"/>
            </a>
            <p class="text-slate-600 dark:text-slate-400 mt-1 text-sm">Crie sua conta gratuita</p>
        </div>

        <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl p-8">
            <h2 class="text-xl font-semibold text-slate-900 dark:text-white mb-6">Cadastro</h2>

            <div th:if="${error}" class="mb-4 bg-red-500/10 border border-red-500/20 text-red-800 dark:text-red-200 px-4 py-3 rounded-xl text-sm">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Nome completo</label>
                    <input type="text" id="name" th:field="*{name}" required
                           class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald focus:border-transparent transition"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">E-mail</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="email"
                           class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald focus:border-transparent transition"/>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Senha</label>
                    <input type="password" id="password" th:field="*{password}" required autocomplete="new-password"
                           class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald focus:border-transparent transition"/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="passwordConfirm" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Confirmar senha</label>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" required autocomplete="new-password"
                           class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald focus:border-transparent transition"/>
                    <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <button type="submit"
                        class="w-full bg-accent-emerald hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                    Criar conta
                </button>
            </form>

            <p class="text-center text-sm text-slate-600 dark:text-slate-400 mt-6">
                Já tem conta?
                <a th:href="@{/auth/login}" class="text-accent-emerald font-medium hover:underline">Fazer login</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
