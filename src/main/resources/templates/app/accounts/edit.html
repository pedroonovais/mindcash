<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="pt-BR">
<head><title>Editar Conta</title></head>
<body>

<div layout:fragment="header">
    <h2 class="text-lg font-semibold text-neutral-900">Editar Conta</h2>
</div>

<div layout:fragment="content">
    <div class="max-w-lg">
        <div class="bg-surface rounded-2xl shadow-card p-6">
            <form th:action="@{/app/accounts/{id}/edit(id=${account.id})}" th:object="${accountRequest}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-1">Nome</label>
                    <input type="text" th:field="*{name}" required
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-1">Tipo</label>
                    <select th:field="*{type}" required
                            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600">
                        <option th:each="t : ${accountTypes}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-1">Moeda</label>
                    <input type="text" th:field="*{currency}" required maxlength="3"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600"/>
                </div>

                <div class="flex gap-3">
                    <button type="submit"
                            class="flex-1 bg-primary hover:bg-primary-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Salvar
                    </button>
                    <a th:href="@{/app/accounts}"
                       class="flex-1 text-center border border-gray-200 text-neutral-700 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
