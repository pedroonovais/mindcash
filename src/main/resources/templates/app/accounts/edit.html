<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/app-layout :: appLayout('Editar Conta — MindCash', ~{::.header}, ~{::.content})}"
      lang="pt-br">
<head><title>Editar Conta</title></head>
<body>

<div class="header">
    <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Editar Conta</h2>
</div>

<div class="content">
    <div class="max-w-lg">
        <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6">
            <form th:action="@{/app/accounts/{id}/edit(id=${account.id})}" th:object="${accountRequest}" method="post" class="space-y-4">
                <div th:if="${error}" class="bg-red-500/10 border border-red-500/20 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg text-sm" th:text="${error}"></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nome</label>
                    <input type="text" th:field="*{name}" required
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tipo</label>
                    <select th:field="*{type}" required
                            class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                        <option th:each="t : ${accountTypes}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Só é permitida uma conta do tipo Investimento por usuário.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Moeda</label>
                    <input type="text" th:field="*{currency}" required maxlength="3"
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                </div>

                <div class="flex gap-3">
                    <button type="submit"
                            class="flex-1 bg-accent-emerald hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Salvar
                    </button>
                    <a th:href="@{/app/accounts}"
                       class="flex-1 text-center border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
