<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="pt-br">
<head><title>Contas</title></head>
<body>

<div layout:fragment="header">
    <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Contas</h2>
</div>

<div layout:fragment="content">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Lista de contas -->
        <div class="lg:col-span-2">
            <div th:if="${#lists.isEmpty(accounts)}" class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-8 text-center">
                <p class="text-slate-600 dark:text-slate-400">Nenhuma conta cadastrada. Crie sua primeira conta ao lado.</p>
            </div>

            <div th:unless="${#lists.isEmpty(accounts)}" class="space-y-4">
                <div th:each="account : ${accounts}"
                     class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6 flex items-center justify-between">
                    <div>
                        <h3 class="font-semibold text-slate-900 dark:text-white" th:text="${account.name}"></h3>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="text-xs bg-accent-emerald/10 text-accent-emerald px-2 py-0.5 rounded-full font-medium"
                                  th:text="${account.type}"></span>
                            <span class="text-xs text-slate-600 dark:text-slate-400" th:text="${account.currency}"></span>
                        </div>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <div>
                            <p class="font-bold text-lg"
                               th:classappend="${account.balance.signum() >= 0} ? 'text-accent-emerald' : 'text-red-500'"
                               th:text="'R$ ' + ${#numbers.formatDecimal(account.balance, 1, 'POINT', 2, 'COMMA')}">
                            </p>
                        </div>
                        <div class="flex items-center gap-2">
                            <a th:href="@{/app/accounts/{id}/edit(id=${account.id})}"
                               class="text-slate-500 hover:text-accent-emerald transition-colors p-1" title="Editar">
                                <span class="material-symbols-outlined text-xl">edit</span>
                            </a>
                            <form th:action="@{/app/accounts/{id}/delete(id=${account.id})}" method="post"
                                  onsubmit="return confirm('Deseja excluir esta conta?');">
                                <button type="submit" class="text-slate-500 hover:text-red-500 transition-colors p-1" title="Excluir">
                                    <span class="material-symbols-outlined text-xl">delete</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário de criação -->
        <div>
            <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6">
                <h3 class="font-semibold text-slate-900 dark:text-white mb-4">Nova Conta</h3>

                <form th:action="@{/app/accounts}" th:object="${accountRequest}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nome</label>
                        <input type="text" th:field="*{name}" required
                               class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tipo</label>
                        <select th:field="*{type}" required
                                class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                            <option value="">Selecione...</option>
                            <option th:each="t : ${accountTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Saldo inicial</label>
                        <input type="number" step="0.01" th:field="*{initialBalance}"
                               class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    </div>

                    <button type="submit"
                            class="w-full bg-accent-emerald hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Criar conta
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
