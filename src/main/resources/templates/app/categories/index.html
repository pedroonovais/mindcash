<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/app-layout :: appLayout('Categorias — MindCash', ~{::.header}, ~{::.content})}"
      lang="pt-br">
<head><title>Categorias</title></head>
<body>

<div class="header">
    <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Categorias</h2>
</div>

<div class="content">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Lista de categorias -->
        <div class="lg:col-span-2">
            <div th:if="${#lists.isEmpty(categories)}" class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-8 text-center">
                <p class="text-slate-600 dark:text-slate-400">Nenhuma categoria encontrada.</p>
            </div>

            <div th:unless="${#lists.isEmpty(categories)}" class="space-y-4">
                <div th:each="cat : ${categories}" class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-5">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-accent-emerald/10 rounded-xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-accent-emerald">label</span>
                            </div>
                            <div>
                                <h3 class="font-semibold text-slate-900 dark:text-white" th:text="${cat.name}"></h3>
                                <span th:if="${cat.user == null}" class="text-xs text-slate-600 dark:text-slate-400 bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded-full">Global</span>
                                <span th:unless="${cat.user == null}" class="text-xs text-accent-emerald bg-accent-emerald/10 px-2 py-0.5 rounded-full">Pessoal</span>
                            </div>
                        </div>
                        <div th:if="${cat.user != null}">
                            <form th:action="@{/app/categories/{id}/delete(id=${cat.id})}" method="post"
                                  onsubmit="return confirm('Deseja excluir esta categoria?');">
                                <button type="submit" class="text-slate-500 hover:text-red-500 transition-colors p-1" title="Excluir">
                                    <span class="material-symbols-outlined text-lg">delete</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- Subcategorias -->
                    <div th:if="${!#lists.isEmpty(cat.children)}" class="ml-12 mt-3 space-y-2">
                        <div th:each="sub : ${cat.children}"
                             class="flex items-center justify-between py-1.5 border-b border-slate-200 dark:border-slate-800 last:border-0">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-slate-600 dark:text-slate-400 text-sm">subdirectory_arrow_right</span>
                                <span class="text-sm text-slate-900 dark:text-white" th:text="${sub.name}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário de criação -->
        <div>
            <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6">
                <h3 class="font-semibold text-slate-900 dark:text-white mb-4">Nova Categoria</h3>

                <form th:action="@{/app/categories}" th:object="${categoryRequest}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nome</label>
                        <input type="text" th:field="*{name}" required
                               class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Ícone (Material Symbols)</label>
                        <input type="text" th:field="*{icon}" placeholder="Ex: restaurant, directions_car, home..."
                               class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Categoria pai (opcional)</label>
                        <select th:field="*{parentId}"
                                class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                            <option value="">Nenhuma (raiz)</option>
                            <option th:each="pc : ${allCategories}" th:value="${pc.id}" th:text="${pc.name}"></option>
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-accent-emerald hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Criar categoria
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
