<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="pt-BR">
<head><title>Categorias</title></head>
<body>

<div layout:fragment="header">
    <h2 class="text-lg font-semibold text-neutral-900">Categorias</h2>
</div>

<div layout:fragment="content">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Lista de categorias -->
        <div class="lg:col-span-2">
            <div th:if="${#lists.isEmpty(categories)}" class="bg-surface rounded-2xl shadow-card p-8 text-center">
                <p class="text-neutral-700">Nenhuma categoria encontrada.</p>
            </div>

            <div th:unless="${#lists.isEmpty(categories)}" class="space-y-4">
                <div th:each="cat : ${categories}" class="bg-surface rounded-2xl shadow-card p-5">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center">
                                <i th:class="'lucide lucide-' + (${cat.icon} ?: 'tag') + ' text-primary'"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-neutral-900" th:text="${cat.name}"></h3>
                                <span th:if="${cat.user == null}" class="text-xs text-neutral-700 bg-neutral-200 px-2 py-0.5 rounded-full">Global</span>
                                <span th:unless="${cat.user == null}" class="text-xs text-primary bg-primary/10 px-2 py-0.5 rounded-full">Pessoal</span>
                            </div>
                        </div>
                        <div th:if="${cat.user != null}">
                            <form th:action="@{/app/categories/{id}/delete(id=${cat.id})}" method="post"
                                  onsubmit="return confirm('Deseja excluir esta categoria?');">
                                <button type="submit" class="text-neutral-700 hover:text-danger transition-colors p-1" title="Excluir">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- Subcategorias -->
                    <div th:if="${!#lists.isEmpty(cat.children)}" class="ml-12 mt-3 space-y-2">
                        <div th:each="sub : ${cat.children}"
                             class="flex items-center justify-between py-1.5 border-b border-neutral-200 last:border-0">
                            <div class="flex items-center gap-2">
                                <i th:class="'lucide lucide-' + (${sub.icon} ?: 'circle') + ' text-neutral-700 text-sm'"></i>
                                <span class="text-sm text-neutral-900" th:text="${sub.name}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário de criação -->
        <div>
            <div class="bg-surface rounded-2xl shadow-card p-6">
                <h3 class="font-semibold text-neutral-900 mb-4">Nova Categoria</h3>

                <form th:action="@{/app/categories}" th:object="${categoryRequest}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Nome</label>
                        <input type="text" th:field="*{name}" required
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600"/>
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger text-xs mt-1"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Ícone (Lucide)</label>
                        <input type="text" th:field="*{icon}" placeholder="Ex: coffee, car, home..."
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600"/>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1">Categoria pai (opcional)</label>
                        <select th:field="*{parentId}"
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600">
                            <option value="">Nenhuma (raiz)</option>
                            <option th:each="pc : ${allCategories}" th:value="${pc.id}" th:text="${pc.name}"></option>
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-primary hover:bg-primary-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Criar categoria
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
