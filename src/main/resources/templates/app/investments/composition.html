<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/app-layout :: appLayout('Composição do saldo — MindCash', ~{::.header}, ~{::.content})}"
      lang="pt-br">
<head><title>Composição do saldo</title></head>
<body>

<div class="header">
    <div class="flex items-center justify-between w-full">
        <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Definir composição do saldo</h2>
        <a th:href="@{/app/investments}"
           class="text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white text-sm font-medium flex items-center gap-1">
            <span class="material-symbols-outlined text-lg">arrow_back</span> Voltar
        </a>
    </div>
</div>

<div class="content">
    <div class="max-w-4xl">
        <div class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-6">
            <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">
                Conta <strong th:text="${account.name}"></strong> — Saldo atual:
                <strong class="text-accent-emerald" th:text="'R$ ' + ${#numbers.formatDecimal(account.balance, 1, 'POINT', 2, 'COMMA')}"></strong>.
                Adicione as posições que compõem esse saldo. A soma dos valores deve ser igual ao saldo.
            </p>

            <form th:action="@{/app/investments/register-composition}" th:object="${compositionRequest}" method="post" id="compositionForm">
                <input type="hidden" th:field="*{destinationAccountId}"/>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-100 dark:bg-slate-800/80">
                            <tr>
                                <th class="text-left px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">Valor (R$)</th>
                                <th class="text-left px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">Tipo</th>
                                <th class="text-left px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">Rentab.</th>
                                <th class="text-left px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">Unidade</th>
                                <th class="text-left px-3 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">Ativo (ticker)</th>
                                <th class="w-10 px-2 py-2"></th>
                            </tr>
                        </thead>
                        <tbody id="positionsBody">
                            <tr th:each="line, stat : ${compositionRequest.positions}" class="position-row border-b border-slate-200 dark:border-slate-700">
                                <td class="px-3 py-2">
                                    <input type="number" step="0.01" min="0.01" th:field="*{positions[__${stat.index}__].amount}"
                                           class="pos-amount w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800"/>
                                </td>
                                <td class="px-3 py-2">
                                    <select th:field="*{positions[__${stat.index}__].investmentType}"
                                            class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800">
                                        <option th:each="t : ${investmentTypes}" th:value="${t}" th:text="${t.label}"></option>
                                    </select>
                                </td>
                                <td class="px-3 py-2">
                                    <input type="number" step="0.01" min="0" th:field="*{positions[__${stat.index}__].rentabilityValue}"
                                           class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800" placeholder="0"/>
                                </td>
                                <td class="px-3 py-2">
                                    <select th:field="*{positions[__${stat.index}__].rentabilityKind}"
                                            class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800">
                                        <option th:each="k : ${rentabilityKinds}" th:value="${k}" th:text="${k.label}"></option>
                                    </select>
                                </td>
                                <td class="px-3 py-2">
                                    <input type="text" th:field="*{positions[__${stat.index}__].assetName}" maxlength="100"
                                           class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800"
                                           placeholder="Ex: PETR4, NVDA"/>
                                </td>
                                <td class="px-2 py-2">
                                    <button type="button" class="btn-remove text-slate-400 hover:text-red-500 p-1" title="Remover linha"
                                            th:if="${stat.index > 0}">
                                        <span class="material-symbols-outlined text-lg">remove_circle</span>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-3 flex items-center gap-4 flex-wrap">
                    <button type="button" id="btnAddRow" class="text-accent-emerald hover:underline text-sm font-medium flex items-center gap-1">
                        <span class="material-symbols-outlined text-lg">add_circle</span> Adicionar linha
                    </button>
                    <span class="text-sm text-slate-600 dark:text-slate-400">
                        Soma: <strong id="sumDisplay">R$ 0,00</strong>
                        <span id="diffHint" class="ml-2"></span>
                    </span>
                </div>

                <p id="errorSum" class="mt-2 text-sm text-red-600 dark:text-red-400 hidden">A soma dos valores deve ser igual ao saldo da conta.</p>
                <p th:if="${#fields.hasErrors('positions')}" th:errors="*{positions}" class="mt-2 text-sm text-red-600 dark:text-red-400"></p>

                <div class="flex gap-3 pt-4">
                    <button type="submit" id="btnSubmit"
                            class="bg-accent-emerald hover:bg-emerald-600 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Registrar composição
                    </button>
                    <a th:href="@{/app/investments}"
                       class="border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
(function() {
    var accountBalance = /*[[${account.balance}]]*/ 0;
    function formatBr(value) {
        return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function updateSum() {
        var inputs = document.querySelectorAll('.pos-amount');
        var sum = 0;
        inputs.forEach(function(inp) { sum += parseFloat(inp.value) || 0; });
        document.getElementById('sumDisplay').textContent = 'R$ ' + formatBr(sum);
        var diff = accountBalance - sum;
        var hint = document.getElementById('diffHint');
        var err = document.getElementById('errorSum');
        var btn = document.getElementById('btnSubmit');
        if (Math.abs(diff) < 0.01) {
            hint.textContent = '';
            err.classList.add('hidden');
            btn.disabled = false;
        } else {
            hint.textContent = '(falta R$ ' + formatBr(Math.abs(diff)) + ')';
            hint.className = 'ml-2 text-amber-600 dark:text-amber-400';
            err.classList.remove('hidden');
            btn.disabled = true;
        }
    }
    function getNextIndex() {
        return document.querySelectorAll('#positionsBody tr.position-row').length;
    }
    function createNewRow(index) {
        var firstRow = document.querySelector('#positionsBody tr.position-row');
        if (!firstRow) return null;
        var typesSelect = firstRow.querySelector('select[name^="positions["]');
        var kindsSelect = firstRow.querySelectorAll('select')[1];
        var typesOpts = typesSelect ? typesSelect.innerHTML : '';
        var kindsOpts = kindsSelect ? kindsSelect.innerHTML : '';
        var tr = document.createElement('tr');
        tr.className = 'position-row border-b border-slate-200 dark:border-slate-700';
        tr.innerHTML = '<td class="px-3 py-2"><input type="number" step="0.01" min="0.01" name="positions[' + index + '].amount" class="pos-amount w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800"/></td>' +
            '<td class="px-3 py-2"><select name="positions[' + index + '].investmentType" class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800">' + typesOpts + '</select></td>' +
            '<td class="px-3 py-2"><input type="number" step="0.01" min="0" name="positions[' + index + '].rentabilityValue" value="0" class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800"/></td>' +
            '<td class="px-3 py-2"><select name="positions[' + index + '].rentabilityKind" class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800">' + kindsOpts + '</select></td>' +
            '<td class="px-3 py-2"><input type="text" name="positions[' + index + '].assetName" maxlength="100" class="w-full px-2 py-1.5 border border-slate-200 dark:border-slate-600 rounded text-slate-900 dark:text-white bg-white dark:bg-slate-800" placeholder="Ex: PETR4, NVDA"/></td>' +
            '<td class="px-2 py-2"><button type="button" class="btn-remove text-slate-400 hover:text-red-500 p-1" title="Remover linha"><span class="material-symbols-outlined text-lg">remove_circle</span></button></td>';
        return tr;
    }
    document.getElementById('btnAddRow').addEventListener('click', function() {
        var next = getNextIndex();
        var tr = createNewRow(next);
        if (tr) {
            document.getElementById('positionsBody').appendChild(tr);
            tr.querySelector('.btn-remove').addEventListener('click', function() { tr.remove(); updateSum(); });
            tr.querySelector('.pos-amount').addEventListener('input', updateSum);
            updateSum();
        }
    });
    document.querySelectorAll('.pos-amount').forEach(function(inp) { inp.addEventListener('input', updateSum); });
    document.querySelectorAll('.btn-remove').forEach(function(btn) {
        btn.addEventListener('click', function() { btn.closest('tr').remove(); updateSum(); });
    });
    document.getElementById('compositionForm').addEventListener('submit', function(e) {
        var inputs = document.querySelectorAll('.pos-amount');
        var sum = 0;
        inputs.forEach(function(inp) { sum += parseFloat(inp.value) || 0; });
        if (Math.abs(accountBalance - sum) >= 0.01) {
            e.preventDefault();
            document.getElementById('errorSum').classList.remove('hidden');
            return false;
        }
    });
    updateSum();
})();
</script>
</body>
</html>
