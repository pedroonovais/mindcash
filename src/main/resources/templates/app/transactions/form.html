<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/app-layout :: appLayout('Nova Transação — MindCash', ~{::.header}, ~{::.content})}"
      lang="pt-br">
<head><title>Nova Transação</title></head>
<body>

<div class="header">
    <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Nova Transação</h2>
</div>

<div class="content">
    <div class="max-w-lg">
        <div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6">

            <form th:action="@{/app/transactions}" th:object="${transactionRequest}" method="post" class="space-y-4">

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tipo</label>
                    <select th:field="*{type}" required
                            class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                        <option value="">Selecione...</option>
                        <option th:each="t : ${transactionTypes}" th:value="${t}" th:text="${t.name() == 'CREDIT' ? 'Receita' : (t.name() == 'DEBIT' ? 'Despesa' : 'Transferência')}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('type')}" th:errors="*{type}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Conta</label>
                    <select th:field="*{accountId}" required
                            class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                        <option value="">Selecione...</option>
                        <option th:each="acc : ${accounts}" th:value="${acc.id}" th:text="${acc.name + ' (' + acc.type + ')'}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('accountId')}" th:errors="*{accountId}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Categoria</label>
                    <select th:field="*{categoryId}"
                            class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                        <option value="">Sem categoria</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                th:text="${cat.parent != null ? cat.parent.name + ' → ' + cat.name : cat.name}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Valor (R$)</label>
                    <input type="number" step="0.01" min="0.01" th:field="*{amount}" required
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    <p th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Data</label>
                    <input type="date" th:field="*{date}" required
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    <p th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Descrição</label>
                    <input type="text" th:field="*{description}" maxlength="255"
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"
                           placeholder="Ex: Supermercado, Salário..."/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Recorrente</label>
                    <select th:field="*{recurrenceType}" id="recurrenceType"
                            class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald">
                        <option value="">Não</option>
                        <option value="MONTHLY">Todo mês</option>
                        <option value="LIMITED_MONTHS">Por X meses</option>
                    </select>
                </div>

                <div id="recurrenceCountWrap" class="hidden">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Quantidade de meses</label>
                    <input type="number" th:field="*{recurrenceCount}" min="2" max="120" placeholder="Ex: 5"
                           class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-accent-emerald"/>
                    <p th:if="${#fields.hasErrors('recurrenceCount')}" th:errors="*{recurrenceCount}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                    <p th:if="${#fields.hasErrors('recurrenceCountValid')}" th:errors="*{recurrenceCountValid}" class="text-red-600 dark:text-red-400 text-xs mt-1"></p>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 bg-accent-emerald hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
                        Registrar
                    </button>
                    <a th:href="@{/app/transactions}"
                       class="flex-1 text-center border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
    <script>
        (function() {
            var sel = document.getElementById('recurrenceType');
            var wrap = document.getElementById('recurrenceCountWrap');
            function toggle() {
                wrap.classList.toggle('hidden', sel.value !== 'LIMITED_MONTHS');
            }
            sel.addEventListener('change', toggle);
            toggle();
        })();
    </script>
</div>
</body>
</html>
