<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="pt-BR">
<head><title>TransaĂ§Ăµes</title></head>
<body>

<div layout:fragment="header">
    <div class="flex items-center justify-between w-full">
        <h2 class="text-lg font-semibold text-neutral-900">TransaĂ§Ăµes</h2>
        <a th:href="@{/app/transactions/new}"
           class="bg-primary hover:bg-primary-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Nova transaĂ§ĂŁo
        </a>
    </div>
</div>

<div layout:fragment="content">

    <div th:if="${transactions.isEmpty()}" class="bg-surface rounded-2xl shadow-card p-8 text-center">
        <p class="text-neutral-700">Nenhuma transaĂ§ĂŁo registrada.</p>
        <a th:href="@{/app/transactions/new}" class="text-primary-600 font-medium hover:underline text-sm mt-2 inline-block">
            Registre sua primeira transaĂ§ĂŁo
        </a>
    </div>

    <div th:unless="${transactions.isEmpty()}" class="bg-surface rounded-2xl shadow-card overflow-hidden">
        <table class="w-full">
            <thead class="bg-neutral-200/50">
                <tr>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-neutral-700 uppercase tracking-wider">Data</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-neutral-700 uppercase tracking-wider">DescriĂ§ĂŁo</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-neutral-700 uppercase tracking-wider">Categoria</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-neutral-700 uppercase tracking-wider">Conta</th>
                    <th class="text-right px-6 py-3 text-xs font-semibold text-neutral-700 uppercase tracking-wider">Valor</th>
                    <th class="px-6 py-3"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-neutral-200">
                <tr th:each="tx : ${transactions}" class="hover:bg-neutral-200/30 transition-colors">
                    <td class="px-6 py-4 text-sm text-neutral-900" th:text="${#temporals.format(tx.date, 'dd/MM/yyyy')}"></td>
                    <td class="px-6 py-4 text-sm text-neutral-900" th:text="${tx.description} ?: 'â€”'"></td>
                    <td class="px-6 py-4 text-sm text-neutral-700" th:text="${tx.category?.name} ?: 'â€”'"></td>
                    <td class="px-6 py-4 text-sm text-neutral-700" th:text="${tx.account.name}"></td>
                    <td class="px-6 py-4 text-sm font-semibold text-right"
                        th:classappend="${tx.type.name() == 'CREDIT'} ? 'text-secondary' : 'text-danger'"
                        th:text="${(tx.type.name() == 'CREDIT' ? '+' : '-') + ' R$ ' + #numbers.formatDecimal(tx.amount, 1, 'POINT', 2, 'COMMA')}">
                    </td>
                    <td class="px-6 py-4 text-right">
                        <form th:action="@{/app/transactions/{id}/delete(id=${tx.id})}" method="post"
                              onsubmit="return confirm('Deseja excluir esta transaĂ§ĂŁo?');" class="inline">
                            <button type="submit" class="text-neutral-700 hover:text-danger transition-colors p-1" title="Excluir">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- PaginaĂ§ĂŁo -->
        <div th:if="${transactions.totalPages > 1}" class="px-6 py-4 border-t border-neutral-200 flex items-center justify-between">
            <span class="text-sm text-neutral-700"
                  th:text="'PĂˇgina ' + ${transactions.number + 1} + ' de ' + ${transactions.totalPages}"></span>
            <div class="flex gap-2">
                <a th:if="${transactions.number > 0}"
                   th:href="@{/app/transactions(page=${transactions.number - 1})}"
                   class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm text-neutral-700 hover:bg-gray-50">
                    Anterior
                </a>
                <a th:if="${transactions.number < transactions.totalPages - 1}"
                   th:href="@{/app/transactions(page=${transactions.number + 1})}"
                   class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm text-neutral-700 hover:bg-gray-50">
                    PrĂłxima
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
