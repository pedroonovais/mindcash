<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="themeInit">
        <script>
            (function() {
                var stored = localStorage.getItem('mindcash-theme');
                if (stored === 'light') {
                    document.documentElement.classList.remove('dark');
                } else {
                    document.documentElement.classList.add('dark');
                }
            })();
        </script>
    </th:block>
</head>
<body>
    <!-- Botão de alternar tema: ícone e label mudam conforme o tema atual -->
    <div th:fragment="themeToggleButton" class="theme-toggle-wrapper">
        <button type="button"
                id="mindcash-theme-toggle"
                aria-label="Alternar entre modo escuro e claro"
                class="flex items-center justify-center gap-1.5 w-9 h-9 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
                title="Alternar tema">
            <span class="material-symbols-outlined text-lg theme-icon-dark" aria-hidden="true">light_mode</span>
            <span class="material-symbols-outlined text-lg theme-icon-light hidden" aria-hidden="true">dark_mode</span>
        </button>
        <script>
            (function() {
                var btn = document.getElementById('mindcash-theme-toggle');
                var iconDark = btn ? btn.querySelector('.theme-icon-dark') : null;
                var iconLight = btn ? btn.querySelector('.theme-icon-light') : null;
                function updateIcon() {
                    var isDark = document.documentElement.classList.contains('dark');
                    if (iconDark) iconDark.classList.toggle('hidden', !isDark);
                    if (iconLight) iconLight.classList.toggle('hidden', isDark);
                    btn.setAttribute('aria-label', isDark ? 'Usar modo claro' : 'Usar modo escuro');
                }
                if (btn) {
                    updateIcon();
                    btn.addEventListener('click', function() {
                        var isDark = document.documentElement.classList.contains('dark');
                        if (isDark) {
                            document.documentElement.classList.remove('dark');
                            localStorage.setItem('mindcash-theme', 'light');
                        } else {
                            document.documentElement.classList.add('dark');
                            localStorage.setItem('mindcash-theme', 'dark');
                        }
                        updateIcon();
                    });
                }
            })();
        </script>
    </div>
</body>
</html>
