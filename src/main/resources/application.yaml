spring:
  application:
    name: mindcash

  docker:
    compose:
      lifecycle-management: start-and-stop
      stop:
        command: stop

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mindcash}
    username: ${DB_USER:mindcash}
    password: ${DB_PASS:mindcash_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

server:
  port: ${APP_PORT:8080}
  servlet:
    session:
      timeout: 30m

logging:
  level:
    com.mindcash: DEBUG
    org.springframework.security: INFO

app:
  investments:
    cdi-annual-rate: 12.0
    daily-update-cron: "0 0 2 * * ?"
    # API de cotações para ações (job diário). Obtenha chave em https://www.alphavantage.co/support/#api-key
    stock-api-enabled: false
    alpha-vantage-api-key: "${ALPHA_VANTAGE_API_KEY}"
